<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestras Invitaciones</title>

    <!-- Metadatos para WhatsApp: REEMPLAZA "TU_REPOSITORIO" POR EL NOMBRE DE TU PROYECTO -->
    <meta property="og:title" content="Nuestras Invitaciones Digitales">
    <meta property="og:image" content="https://invitaendigitalweb-svg.github.io/TU_REPOSITORIO/portada.png">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; padding: 0; background-color: #FFFFFF; 
            font-family: 'Cinzel', serif; text-align: center; 
            overflow-x: hidden; /* Evita que la página se mueva horizontalmente */
            width: 100%;
        }
        
        .banner { background-color: #6A4A66; color: #FFFFFF; padding: 30px 10px; width: 100%; margin-top: 30px; }
        .banner h1 { margin: 0; font-size: 28px; letter-spacing: 2px; text-transform: uppercase; }

        .foto-portada { 
            width: 90%; max-width: 450px; 
            margin: 25px auto; display: block; 
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .boton-contenedor { margin: 20px 0 40px 0; }

        .boton-ejemplo { 
            background-color: #6A4A66; color: #FFFFFF; padding: 18px 40px; 
            text-decoration: none; font-size: 18px; border-radius: 8px; 
            display: inline-block; border: 1px solid #FFFFFF; 
            margin-bottom: 15px; font-family: 'Montserrat', sans-serif;
        }
        
        .boton-cotizacion { 
            background-color: #A47C9F; color: #FFFFFF; padding: 15px 35px; 
            text-decoration: none; font-size: 16px; border-radius: 8px; 
            display: inline-block; border: 1px solid #FFFFFF; 
            font-family: 'Montserrat', sans-serif;
        }

        .contenedor-form { 
            max-width: 90%; width: 340px; margin: 20px auto 60px; 
            padding: 25px; background: #f9f9f9; border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-family: 'Montserrat', sans-serif; 
        }
        .contenedor-form h1 { color: #6A4A66; font-size: 20px; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1.5px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #6A4A66; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="banner"><h1>Invitación Básica</h1></div>
    <img src="portada1xv.jpg" class="foto-portada">
    <div class="boton-contenedor">
        <a href="https://invitaendigitalweb-svg.github.io/xvbasica/" class="boton-ejemplo">VER EJEMPLO</a><br>
        <a href="https://wa.link/k0ohs4" target="_blank" class="boton-cotizacion">COTIZACIÓN</a>
    </div>

    <div class="banner"><h1>Invitación Completa</h1></div>
    <img src="portada2xv.jpg" class="foto-portada">
    <div class="boton-contenedor">
        <a href="https://invitaendigitalweb-svg.github.io/xvcompleta/" class="boton-ejemplo">VER EJEMPLO</a><br>
        <a href="https://wa.link/k0ohs4" target="_blank" class="boton-cotizacion">COTIZACIÓN</a>
    </div>

    <div class="banner"><h1>Invitación Premium</h1></div>
    <img src="portada3xv.png" class="foto-portada">
    <div class="boton-contenedor">
        <a href="https://invitaendigitalweb-svg.github.io/bodapremium/" class="boton-ejemplo">VER EJEMPLO</a><br>
        <a href="https://wa.link/k0ohs4" target="_blank" class="boton-cotizacion">COTIZACIÓN</a>
    </div>

    <div class="contenedor-form">
        <h1>CONTÁCTANOS</h1>
        <form id="miFormulario">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="tel" id="telefono" placeholder="Número de WhatsApp" required>
            <button type="submit">ENVIAR</button>
        </form>
        <div id="mensaje" style="margin-top:15px; font-size:14px; color:#6A4A66;"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbw2LwNR2llPMGvdVBqkcV9s2xPzVRF3h_d0hvRRTKw6TL80QClztwXB4NFkkk0mlvVS/exec";
        document.getElementById("miFormulario").addEventListener("submit", function(e){
            e.preventDefault();
            const datos = { nombre: document.getElementById("nombre").value, telefono: document.getElementById("telefono").value };
            fetch(URL, { method: "POST", body: JSON.stringify(datos) })
            .then(() => {
                document.getElementById("mensaje").innerHTML = "✓ ¡Gracias! Hemos recibido tu información.";
                document.getElementById("miFormulario").reset();
            })
            .catch(() => { document.getElementById("mensaje").innerHTML = "Error al enviar."; });
        });
    </script>
</body>
</html>
